# Configuration Worker studyforge-proxy (bindings à ajouter)
# Nom du Worker existant : studyforge-proxy
name = "studyforge-proxy"
main = "worker.js"
compatibility_date = "2026-03-12"
preview_urls = true

[observability]
enabled = true
[observability.logs]
enabled = true

# ============ D1 (jurisdiction EU — conformité RGPD) ============
# Créer avec :
#   wrangler d1 create bordereaux_prod --jurisdiction eu
# Puis coller le database_id retourné ci-dessous
[[d1_databases]]
binding       = "DB"
database_name = "bordereaux_prod"
database_id   = "c56a1a95-1a33-49f6-9a56-9d30cc1c732f"

# ============ R2 (jurisdiction EU) ============
# Créer avec :
#   wrangler r2 bucket create bordereaux-pdf --jurisdiction eu
[[r2_buckets]]
binding      = "BUCKET"
bucket_name  = "bordereaux-pdf"
jurisdiction = "eu"

# ============ Cron (purge RGPD > 5 ans) ============
# Déclenche /cron/purge tous les jours à 03h00 UTC
[triggers]
crons = ["0 3 * * *"]

# ============ Secrets (à définir séparément) ============
# wrangler secret put ANTHROPIC_API_KEY          (déjà fait)
# wrangler secret put GITHUB_TOKEN               (déjà fait)
# wrangler secret put BORDEREAUX_AUTH_TOKEN      (à créer : token partagé équipe Cameleons)
